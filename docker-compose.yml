services:
  gem5:
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
    platform: linux/amd64
    image: gem5-riscv:latest
    container_name: gem5
    working_dir: /workspace

    environment:
      - GEM5_ROOT=/gem5
      - PYTHONPATH=/gem5/src/python

    volumes:
      - ./:/workspace

    stdin_open: true
    tty: true

    # Optional: limits to avoid OOM during heavy parallel compilation.
    # Rule of thumb: ~2 GB RAM per thread.
    # deploy:
    #   resources:
    #     limits:
    #       cpus: "8"
    #       memory: "16g"

    command: bash

  tex:
    image: texlive/texlive:latest
    container_name: tex
    working_dir: /workspace/trabalho_latex

    volumes:
      - ./:/workspace

    command: >
      bash -c "
      pdflatex -interaction=nonstopmode main.tex &&
      bibtex main &&
      pdflatex -interaction=nonstopmode main.tex &&
      pdflatex -interaction=nonstopmode main.tex &&
      pdflatex -interaction=nonstopmode apresentacao.tex &&
      pdflatex -interaction=nonstopmode apresentacao.tex &&
      rm -f *.aux *.log *.out *.bbl *.blg *.toc *.nav *.snm *.vrb
      "

